<!DOCTYPE html>
<html>
<head>
    <title>Debug Storage</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .section { margin: 20px 0; padding: 10px; border: 1px solid #ccc; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Debug LocalStorage</h1>
    
    <div class="section">
        <h2>Notices in localStorage:</h2>
        <pre id="notices"></pre>
    </div>
    
    <div class="section">
        <h2>Events in localStorage:</h2>
        <pre id="events"></pre>
    </div>
    
    <div class="section">
        <h2>Current URL:</h2>
        <pre id="url"></pre>
    </div>
    
    <script>
        // Display notices
        const notices = localStorage.getItem('notices');
        document.getElementById('notices').textContent = notices || 'No notices found';
        
        // Display events
        const events = localStorage.getItem('events');
        document.getElementById('events').textContent = events || 'No events found';
        
        // Display current URL
        document.getElementById('url').textContent = window.location.href;
    </script>
</body>
</html>
